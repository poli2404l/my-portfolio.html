<!DOCTYPE html>
<html>

<head>
    <title>Different Types of Functions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        button {
            margin: 5px;
            padding: 5px 5px;
            font-size: 12px;
            background-color: blue;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Ways of Creating Functions in JavaScript</h2>

    <button onclick="normalFunction()">Normal Function</button>
    <button onclick="argumentFunction(5, 10)">Function with Arguments</button>    
    <button onclick="arrowFunction()">Arrow Function</button>
    <button onclick="singleline_arrow()">single line Arrow Function</button>
    <button onclick="arrowfunc_arg('sai')">Arrow Function with arguments</button>
    <button onclick="callConstructor(5,10)">Function using constructor</button>

    <p id="output" style="color:blue; font-weight:bold;"></p>
    <script>
        //Normal Function
        function normalFunction() {
            document.getElementById("output").innerText = "Hello" + "This is a normal Function";
        }
        // Function with Arguements
        function argumentFunction(a, b) {
            let sum = a + b;
            document.getElementById("output").innerText = "sum of " + a + " and " + b + " is : " + sum;
        }
        //Arrow Function
        const arrowFunction = () => {
            document.getElementById("output").innerText = "This is an arrow function";
        }
        // Single Line Arrow Function
        
    </script>
