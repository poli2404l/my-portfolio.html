<!DOCTYPE html>
<html>
<head>
    <title>Semantic Tags Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header, nav, main, section, article, aside, footer {
            padding: 15px;
            margin: 10px;
            border: 2px solid #333;
        }
        nav {
            background-color: #f2f2f2;
        }
        section {
            width: 70%;
            background-color: #e8f4ff;
        }
        article {
            background-color: #fff3cd;
        }
        aside {
            background-color: #e2ffe2;
            width:30%;
        }
        footer {
            background-color: #ddd;
            text-align: center;
        }
        main {
            display: flex;
            gap: 20px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
        <p>Logo and title area</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <main>

        <!-- Section -->
        <section>
            <h2>Technology</h2>

            <!-- Article -->
            <article>
                <h3>HTML Semantic Tags</h3>
                <p>This article explains semantic tags in HTML.</p>
            </article>

        </section>

        <!-- Aside -->
        <aside>
            <h3>Related Links</h3>
            <p>HTML Basics</p>
            <p>CSS Basics</p>
        </aside>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
