<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design with Media Queries</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      line-height: 1.6;
    }

    header {
      background-color: #3498db;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background-color: #2c3e50;
      display: flex;
      flex-direction: column; 
      text-align: center;
    }

    nav a {
      color: white;
      padding: 15px;
      text-decoration: none;
      border-bottom: 1px solid #34495e;
      transition: background 0.3s ease;
    }

    nav a:hover {
      background-color: #74efd6;
    }

    main {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .container {
      display: flex;
      flex-direction: column; 
      gap: 20px;
    }

    .box {
      background-color: #e67e22;
      color: white;
      padding: 40px;
      text-align: center;
      font-size: 1.2rem;
      border-radius: 8px;
      flex: 1;
    }

    body::before {
      content: "Mobile View (<768px)";
      display: block;
      background-color: #c0392b;
      color: white;
      text-align: center;
      font-weight: bold;
      padding: 5px 0;
    }

    @media (min-width: 768px) {
      nav {
        flex-direction: row;
        justify-content: center;
      }
      nav a {
        border-bottom: none;
        border-right: 1px solid #34495e;
      }
      nav a:last-child {
        border-right: none;
      }
      .container {
        flex-direction: row; 
      }
      body::before {
        content: "Tablet View (768px - 1024px)";
        background-color: #27ae60;
      }
    }

    /* Desktop View */
    @media (min-width: 1024px) {
      .box {
        font-size: 1.5rem;
        padding: 60px;
      }
      body::before {
        content: "Desktop View (>1024px)";
        background-color: #8e44ad;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Responsive Design Demo</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <main>
    <div class="container">
      <div class="box">Box 1</div>
      <div class="box">Box 2</div>
      <div class="box">Box 3</div>
    </div>
  </main>

  
</body>
</html>
